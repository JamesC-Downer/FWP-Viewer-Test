<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Renewals Review Map</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet"/> 
    <style>
    #legend {
        position: absolute;
        top: 20px;
        left: 20px;
        background: white;
        padding: 10px;
        font-family: Arial, sans-serif;
        font-size: 13px;
        border-radius: 6px;
        box-shadow: 0 0 5px rgba(0,0,0,0.3);
    }
    
    #legend h3 {
        margin: 0 0 8px;
        font-size: 14px;
    }
    
    #legend label {
        display: flex;
        align-items: center;
        margin-bottom: 5px;
        cursor: pointer;
    }
    
    #legend input {
        margin-right: 6px;
    }
    
    #legend span {
        width: 16px;
        height: 16px;
        display: inline-block;
        margin-right: 6px;
        border-radius: 3px;
    }


    </style>
</head>
<body>
    <div id="map" style="height:100vh;"></div>
    
    <div id="legend">
        <h3>Programme Year</h3>
    
        <label>
            <input type="checkbox" value="25/26" checked>
            <span style="background:#fed976"></span> 25/26
        </label><br>
    
        <label>
            <input type="checkbox" value="26/27" checked>
            <span style="background:#fd8d3c"></span> 26/27
        </label><br>
    
        <label>
            <input type="checkbox" value="27/28" checked>
            <span style="background:#e31a1c"></span> 27/28
        </label><br>
    
        <label>
            <input type="checkbox" value="28/29" checked>
            <span style="background:#800026"></span> 28/29
        </label>
    </div>
    
    <script src="app.js"></script>
</body>
</html>

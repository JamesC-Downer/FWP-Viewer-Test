<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Renewals Review Map</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet"/> 
    <style>
        
        #control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            padding: 12px;
            font-family: Arial;
            font-size: 12px;
            border-radius: 6px;
            box-shadow: 0 0 6px rgba(0,0,0,0.3);
            width: 220px;
        }
        
        .asset-row {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }
        
        .asset-row label {
            flex: 1;
        }
        
        .year {
            width: 12px;
            height: 12px;
            margin-left: 3px;
            border-radius: 2px;
        }
        
        /* Roads: yellow-red */
        .roads.y1 { background: #fed976; }
        .roads.y2 { background: #fd8d3c; }
        .roads.y3 { background: #e31a1c; }
        .roads.y4 { background: #800026; }
        
        /* Footpaths: greens */
        .footpaths.y1 { background: #e5f5e0; }
        .footpaths.y2 { background: #a1d99b; }
        .footpaths.y3 { background: #31a354; }
        .footpaths.y4 { background: #006d2c; }
        
        /* Kerb: blues */
        .swcs.y1 { background: #deebf7; }
        .swcs.y2 { background: #9ecae1; }
        .swcs.y3 { background: #3182bd; }
        .swcs.y4 { background: #08519c; }
        
        /* Lights 
        .lights.y1 { background: #fff7bc; }
        .lights.y2 { background: #fec44f; }
        .lights.y3 { background: #fe9929; }
        .lights.y4 { background: #cc4c02; }
        
        /* Signals 
        .signals.y1 { background: #fcae91; }
        .signals.y2 { background: #fb6a4a; }
        .signals.y3 { background: #de2d26; }
        .signals.y4 { background: #a50f15; }
        */
    </style>
</head>
<body>
    <div id="map" style="height:100vh;"></div>
    <div id="control-panel">
        <h3>Assets & Programme</h3>
    
        <!-- Asset toggles + colour ramps -->
        <div class="asset-row">
            <label><input type="checkbox" value="roads-layer" checked> Roads</label>
            <span class="year y1 roads"></span>
            <span class="year y2 roads"></span>
            <span class="year y3 roads"></span>
            <span class="year y4 roads"></span>
        </div>
    
        <div class="asset-row">
            <label><input type="checkbox" value="footpaths-layer" checked> Footpaths</label>
            <span class="year y1 footpaths"></span>
            <span class="year y2 footpaths"></span>
            <span class="year y3 footpaths"></span>
            <span class="year y4 footpaths"></span>
        </div>
        
        <div class="asset-row">
            <label><input type="checkbox" value="swcs-layer" checked> Surface Water Channels</label>
            <span class="year y1 swcs"></span>
            <span class="year y2 swcs"></span>
            <span class="year y3 swcs"></span>
            <span class="year y4 swcs"></span>
        </div>
        <!--
        <div class="asset-row">
            <label><input type="checkbox" value="streetlights-layer" checked> Streetlights</label>
            <span class="year y1 lights"></span>
            <span class="year y2 lights"></span>
            <span class="year y3 lights"></span>
            <span class="year y4 lights"></span>
        </div>
    
        <div class="asset-row">
            <label><input type="checkbox" value="signals-layer" checked> Traffic Signals</label>
            <span class="year y1 signals"></span>
            <span class="year y2 signals"></span>
            <span class="year y3 signals"></span>
            <span class="year y4 signals"></span>
        </div>
        -->
        <hr>
    
        <!-- Year filter -->
        <h4>Programme Year</h4>
    
        <label><input type="checkbox" class="year-filter" value="26/27" checked> 26/27</label><br>
        <label><input type="checkbox" class="year-filter" value="27/28" checked> 27/28</label><br>
        <label><input type="checkbox" class="year-filter" value="28/29" checked> 28/29</label><br>
        <label><input type="checkbox" class="year-filter" value="29/30" checked> 29/30</label>
    </div>

    
    <script src="app.js" defer></script>
</body>
</html>
